<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nancy's Work HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#fafaf9;--bg2:#f3f2ee;--bg3:#eceae4;
--text:#1a1a18;--text2:#5f5e5a;--text3:#9b9994;
--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.22);
--pk50:#FBEAF0;--pk100:#F4C0D1;--pk200:#ED93B1;--pk400:#D4537E;--pk600:#993556;--pk800:#72243E;
--t50:#E1F5EE;--t100:#9FE1CB;--t400:#1D9E75;--t600:#0F6E56;
--a50:#FAEEDA;--a100:#FAC775;--a400:#BA7517;--a600:#854F0B;
--c50:#F1EFE8;--c100:#D3D1C7;--c400:#888780;--c600:#5F5E5A;
--b50:#E6F1FB;--b100:#B5D4F4;--b400:#378ADD;--b600:#185FA5;--b800:#0C447C;
--g50:#EAF3DE;--g100:#C0DD97;--g400:#639922;--g600:#3B6D11;
--r50:#FCEBEB;--r100:#F7C1C1;--r400:#E24B4A;--r600:#A32D2D;
--radius:12px;--radius-sm:8px;
--sidebar:240px;
}
@media(prefers-color-scheme:dark){:root{
--bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
--text:#f0ede8;--text2:#a8a49e;--text3:#6b6760;
--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.25);
--pk50:#4B1528;--pk100:#72243E;--pk200:#993556;--pk400:#D4537E;--pk600:#ED93B1;--pk800:#F4C0D1;
--b50:#042C53;--b100:#0C447C;--b400:#378ADD;--b600:#85B7EB;--b800:#B5D4F4;
--g50:#173404;--g100:#27500A;--g400:#639922;--g600:#97C459;
--a50:#412402;--a100:#633806;--a400:#BA7517;--a600:#EF9F27;
--c50:#2C2C2A;--c100:#444441;--c400:#888780;--c600:#B4B2A9;
--t50:#04342C;--t100:#085041;--t400:#1D9E75;--t600:#5DCAA5;
--r50:#501313;--r100:#791F1F;--r400:#E24B4A;--r600:#F09595;
}}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

.layout{display:flex;min-height:100vh}

.sidebar{width:var(--sidebar);background:var(--bg2);border-right:2px solid var(--border);padding:1rem 0;display:flex;flex-direction:column;gap:0;transition:width .3s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;overflow-x:hidden}
.sidebar.collapsed{width:52px}
.sidebar-top{display:flex;align-items:center;justify-content:space-between;padding:0 12px 12px;border-bottom:2px solid var(--border);margin-bottom:8px;flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;opacity:1;transition:opacity .2s}
.sidebar.collapsed .sidebar-title{opacity:0;width:0}
.sidebar-toggle{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.sidebar-toggle:hover{background:var(--pk50);border-color:var(--pk200);color:var(--pk600);transform:scale(1.1)}

.filter-group{padding:4px 8px}
.filter-group-label{font-size:9px;font-weight:800;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:4px 4px 5px;white-space:nowrap;overflow:hidden;opacity:1;transition:opacity .2s}
.sidebar.collapsed .filter-group-label{opacity:0}
.filter-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;text-align:left;transition:all .15s;white-space:nowrap;overflow:hidden}
.filter-btn:hover{background:var(--bg3)}
.filter-btn.active{background:var(--pk50);color:var(--pk800)}
.filter-btn .f-icon{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.filter-btn .f-label{overflow:hidden;opacity:1;transition:opacity .2s;flex:1}
.sidebar.collapsed .filter-btn .f-label{opacity:0;width:0}
.filter-btn .f-count{font-size:10px;font-weight:800;padding:1px 6px;border-radius:99px;background:var(--border);color:var(--text3);flex-shrink:0;transition:opacity .2s}
.sidebar.collapsed .filter-btn .f-count{opacity:0}
.filter-btn.active .f-icon{color:#fff}

.cat-multi-wrap{padding:4px 8px}
.cat-multi-label{font-size:9px;font-weight:800;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:4px 4px 5px;white-space:nowrap;opacity:1;transition:opacity .2s}
.sidebar.collapsed .cat-multi-label{opacity:0}
.cat-pill-row{display:flex;flex-direction:column;gap:2px}
.cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:var(--radius-sm);border:2px solid transparent;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;text-align:left;transition:all .15s;white-space:nowrap;overflow:hidden}
.cat-btn:hover{background:var(--bg3)}
.cat-btn.active-cat{border-color:currentColor}
.cat-btn .f-label{overflow:hidden;opacity:1;transition:opacity .2s;flex:1}
.sidebar.collapsed .cat-btn .f-label{opacity:0;width:0}
.sidebar-sep{height:1px;background:var(--border);margin:6px 8px}

.main{flex:1;padding:1.5rem 1.5rem 4rem;min-width:0}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.app-title{font-size:24px;font-weight:800;color:var(--text)}
.app-sub{font-size:13px;font-weight:600;color:var(--text2);margin-top:3px}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-top:4px}
.prog-bar{width:150px;height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;border:2px solid var(--pk100)}
.prog-fill{height:100%;background:var(--pk400);border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.prog-txt{font-size:12px;font-weight:700;color:var(--text3)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.stat{border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1);font-weight:700}
.stat:hover{transform:translateY(-4px) scale(1.03)}
.stat:active{transform:scale(0.96)}
.stat.active-filter{outline:3px solid var(--text);outline-offset:2px;transform:translateY(-2px)}
.stat-n{font-size:26px;font-weight:800}
.stat-l{font-size:12px;font-weight:700;margin-top:3px;letter-spacing:.02em}
.stat-mine{background:var(--pk50);border:2px solid var(--pk200)}.stat-mine .stat-n{color:var(--pk800)}.stat-mine .stat-l{color:var(--pk600)}
.stat-theirs{background:var(--b50);border:2px solid var(--b100)}.stat-theirs .stat-n{color:var(--b800)}.stat-theirs .stat-l{color:var(--b600)}
.stat-both{background:var(--a50);border:2px solid var(--a100)}.stat-both .stat-n{color:var(--a600)}.stat-both .stat-l{color:var(--a400)}
.stat-done{background:var(--g50);border:2px solid var(--g100)}.stat-done .stat-n{color:var(--g600)}.stat-done .stat-l{color:var(--g400)}
.nudge{background:var(--pk50);border:2px solid var(--pk200);border-radius:var(--radius);padding:14px 16px;margin-bottom:1.25rem}
.nudge-label{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--pk600);text-transform:uppercase;margin-bottom:5px}
.nudge-msg{font-size:14px;font-weight:600;color:var(--pk800);line-height:1.6}
.nudge-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.nudge-btn{font-size:12px;font-weight:700;padding:5px 14px;border-radius:99px;background:var(--pk100);color:var(--pk800);border:2px solid var(--pk200);cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.nudge-btn:hover{background:var(--pk400);color:#fff;border-color:var(--pk400);transform:scale(1.07)}
.add-toggle{font-size:13px;font-weight:700;padding:8px 20px;border-radius:99px;border:2px solid var(--pk400);background:transparent;color:var(--pk600);cursor:pointer;margin-bottom:1.25rem;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.add-toggle:hover{background:var(--pk50);transform:scale(1.05)}
.add-form{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:1.5rem;border:2px solid var(--pk100);display:none}
.add-form.open{display:block;animation:slideDown .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.form-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;flex:1;min-width:140px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
input[type=text],input[type=date],select{background:var(--bg);color:var(--text);border:2px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;font-weight:600;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus{border-color:#1a1a18;box-shadow:0 0 0 3px var(--pk100)}
.recur-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border:2px solid var(--border2);border-radius:var(--radius-sm);margin-bottom:10px;flex-wrap:wrap}
.recur-label{font-size:13px;font-weight:700;color:var(--text2);flex:1}
.freq-select{font-size:12px;padding:4px 8px;border:2px solid var(--pk200);border-radius:var(--radius-sm);background:var(--pk50);color:var(--pk800);font-weight:700;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;outline:none}
.rich-editor-wrap{border:2px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);overflow:hidden;transition:border-color .15s}
.rich-editor-wrap:focus-within{border-color:#1a1a18;box-shadow:0 0 0 3px var(--pk100)}
.rich-toolbar{display:flex;gap:3px;padding:6px 8px;border-bottom:2px solid var(--border);flex-wrap:wrap;align-items:center;background:var(--bg2)}
.tb-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;transition:transform .15s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
.tb-btn:hover{background:var(--pk50);border-color:var(--pk200);color:var(--pk800);transform:scale(1.15)}
.tb-sep{width:1px;height:20px;background:var(--border2);margin:0 3px;flex-shrink:0}
.tb-select{padding:2px 6px;font-size:12px;font-weight:700;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;outline:none}
.rich-editor{min-height:80px;padding:8px 10px;font-size:13px;font-weight:500;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;color:var(--text);outline:none;line-height:1.6}
.rich-editor ul,.rich-editor ol{padding-left:1.4em}
.rich-editor[placeholder]:empty::before{content:attr(placeholder);color:var(--text3)}
.sub-add-row{display:flex;gap:6px;margin-top:6px}
.sub-add-row input{flex:1;font-size:13px}
.add-sub-btn{font-size:12px;font-weight:700;padding:0 12px;border:2px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:transform .15s}
.add-sub-btn:hover{background:var(--bg3);transform:scale(1.05)}
.steps-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.step-item{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px}
.step-main{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text2)}
.step-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;margin-left:auto;transition:transform .15s}
.step-del:hover{transform:scale(1.3);color:var(--r400)}
.substeps{display:flex;flex-direction:column;gap:3px;margin-top:4px;margin-left:20px}
.substep-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text3)}
.substep-add-row{display:flex;gap:5px;margin-top:4px}
.substep-add-row input{flex:1;font-size:12px;padding:4px 8px}
.substep-add-btn{font-size:11px;font-weight:700;padding:0 8px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn-save{font-size:13px;font-weight:700;padding:8px 22px;border-radius:99px;background:var(--pk400);color:#fff;border:none;cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.btn-save:hover{background:var(--pk600);transform:scale(1.06)}
.btn-cancel{font-size:13px;font-weight:700;padding:8px 16px;border-radius:99px;background:transparent;border:2px solid var(--border2);color:var(--text2);cursor:pointer;transition:transform .15s}
.btn-cancel:hover{transform:scale(1.04)}
.section{margin-bottom:1.5rem}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:13px;font-weight:800;display:flex;align-items:center;gap:7px;color:var(--text)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-mine{background:var(--pk400)}.dot-theirs{background:var(--b400)}.dot-both{background:var(--a400)}.dot-hold{background:var(--c400)}.dot-idea{background:var(--c400)}.dot-recurring{background:var(--t400)}
.section-count{font-size:11px;font-weight:700;color:var(--text3)}
.card{background:var(--bg);border:2px solid var(--border2);border-radius:var(--radius);margin-bottom:6px;overflow:hidden;transition:border-color .2s,transform .2s cubic-bezier(.34,1.56,.64,1);animation:cardIn .25s cubic-bezier(.34,1.56,.64,1) both}
.card:hover{border-color:var(--pk400);transform:translateX(3px)}
.card.done{opacity:.5}
.card.recurring-card{border-color:var(--t100)}
.card-main{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.chk:hover{transform:scale(1.2)}
.chk.on{background:var(--g400);border-color:var(--g400);animation:popIn .25s cubic-bezier(.34,1.56,.64,1)}
.chk.on::after{content:'';display:block;width:5px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
.card-body{flex:1;min-width:0;cursor:pointer}
.card-title{font-size:14px;color:var(--text);font-weight:700;line-height:1.4;word-break:break-word}
.card.done .card-title{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.pill{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:700;white-space:nowrap;transition:transform .15s}
.pill:hover{transform:scale(1.08)}
.pill-mine{background:var(--pk50);color:var(--pk800);border:1.5px solid var(--pk100)}
.pill-theirs{background:var(--b50);color:var(--b800);border:1.5px solid var(--b100)}
.pill-both{background:var(--a50);color:var(--a600);border:1.5px solid var(--a100)}
.pill-hold{background:var(--c50);color:var(--c600);border:1.5px solid var(--c100)}
.pill-high{background:var(--r50);color:var(--r600);border:1.5px solid var(--r100)}
.pill-med{background:var(--a50);color:var(--a600);border:1.5px solid var(--a100)}
.pill-low{background:var(--g50);color:var(--g600);border:1.5px solid var(--g100)}
.pill-due{background:var(--pk50);color:var(--pk800);border:1.5px solid var(--pk100)}
.pill-overdue{background:var(--r50);color:var(--r600);border:1.5px solid var(--r100)}
.pill-person{background:var(--t50);color:var(--t600);border:1.5px solid var(--t100)}
.pill-plan{background:var(--b50);color:var(--b800);border:1.5px solid var(--b100)}
.cat-task{background:var(--b50);color:var(--b800);border:1.5px solid var(--b100)}
.cat-project{background:var(--pk50);color:var(--pk800);border:1.5px solid var(--pk100)}
.cat-recurring{background:var(--t50);color:var(--t600);border:1.5px solid var(--t100)}
.cat-tracking{background:var(--a50);color:var(--a600);border:1.5px solid var(--a100)}
.cat-idea{background:var(--c50);color:var(--c600);border:1.5px solid var(--c100)}
.pill-freq{background:var(--t50);color:var(--t600);border:1.5px solid var(--t100)}
.card-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-top:1px}
.card-action-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .15s}
.card-action-btn:hover{transform:scale(1.15)}
.card-action-btn.edit-btn{color:var(--pk400)}.card-action-btn.edit-btn:hover{background:var(--pk50);border-color:var(--pk200)}
.card-action-btn.del-btn{color:var(--r400)}.card-action-btn.del-btn:hover{background:var(--r50);border-color:var(--r100)}
.card-action-btn.exp-btn{color:var(--text3)}.card-action-btn.exp-btn:hover{background:var(--bg2);border-color:var(--border2);color:var(--text)}
.card-detail{padding:0 14px 14px 42px;display:none;flex-direction:column;gap:10px}
.card-detail.open{display:flex;animation:slideDown .2s cubic-bezier(.34,1.56,.64,1)}
.detail-section{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;border:2px solid var(--border)}
.detail-label{font-size:10px;font-weight:800;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.detail-content{font-size:13px;font-weight:500;color:var(--text2);line-height:1.6}
.detail-content b,.detail-content strong{font-weight:800;color:var(--text)}
.detail-content i,.detail-content em{font-style:italic}
.detail-content ul,.detail-content ol{padding-left:1.4em}
.card-step{display:flex;flex-direction:column;gap:3px}
.card-step-main{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text2)}
.card-substep{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--text3);margin-left:22px}
.sub-chk{width:15px;height:15px;border-radius:4px;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.sub-chk:hover{transform:scale(1.2)}
.sub-chk.on{background:var(--pk400);border-color:var(--pk400)}
.sub-chk.on::after{content:'';display:block;width:4px;height:6px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
.sub-chk.sm{width:12px;height:12px;border-radius:3px}
.sub-done{text-decoration:line-through;color:var(--text3)}
.people-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid rgba(0,0,0,0.1);transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.avatar:hover{transform:scale(1.2)}
.person-name{font-size:12px;font-weight:700;color:var(--text2)}
.link-item{font-size:12px;font-weight:700;color:var(--b600);word-break:break-all;text-decoration:none}
.link-item:hover{text-decoration:underline}
.empty-state{padding:2.5rem;text-align:center;color:var(--text3);font-size:13px;font-weight:600;background:var(--bg2);border-radius:var(--radius);border:2px solid var(--border);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.edit-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:100;overflow-y:auto}
.edit-overlay.open{display:flex}
.edit-modal{background:var(--bg);border-radius:var(--radius);border:2px solid var(--pk200);padding:20px;width:100%;max-width:580px;margin:auto;animation:slideDown .25s cubic-bezier(.34,1.56,.64,1)}
.edit-modal-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:16px}
.recur-done-note{font-size:12px;font-weight:600;color:var(--t600);background:var(--t50);border:1.5px solid var(--t100);border-radius:var(--radius-sm);padding:6px 10px;margin-top:4px}
</style>
</head>
<body>
<div class="layout">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-title">Filters</span>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">&#8644;</button>
    </div>
    <div id="sidebar-content"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="app-title">Nancy's Work HQ</div>
        <div class="app-sub" id="greeting"></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="progfill" style="width:0%"></div></div>
        <span class="prog-txt" id="progtxt">0% done</span>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="nudge">
      <div class="nudge-label">what's next for you</div>
      <div class="nudge-msg" id="nudge-msg">Add some tasks and I'll figure out where you should start.</div>
      <div class="nudge-actions">
        <button class="nudge-btn" onclick="suggest()">Refresh suggestion</button>
      </div>
    </div>

    <button class="add-toggle" id="add-toggle-btn" onclick="toggleForm()">+ Add a new task</button>

    <div class="add-form" id="add-form">
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label class="form-label">Task title</label>
          <input type="text" id="f-title" placeholder="What needs doing?">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="f-cat" onchange="toggleRecur('f-cat','f-recur-row')">
            <option value="task">Quick task</option>
            <option value="project">Project</option>
            <option value="recurring">Recurring task</option>
            <option value="tracking">Tracking</option>
            <option value="idea">Future idea</option>
          </select>
        </div>
      </div>
      <div class="recur-row" id="f-recur-row" style="display:none">
        <span class="recur-label">How often does this repeat?</span>
        <select class="freq-select" id="f-freq">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Action owner</label>
          <select id="f-owner">
            <option value="mine">Action needed</option>
            <option value="theirs">Awaiting other's action</option>
            <option value="both">Collaborative progress</option>
            <option value="hold">On hold</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Energy needed</label>
          <select id="f-energy">
            <option value="med" selected>Medium</option>
            <option value="high">High focus</option>
            <option value="low">Low effort</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Due date</label>
          <input type="date" id="f-due">
        </div>
        <div class="form-group">
          <label class="form-label">Plan to do</label>
          <input type="date" id="f-plan">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label class="form-label">People involved</label>
          <input type="text" id="f-people" placeholder="e.g. Alex, Bruce, Ryan">
        </div>
        <div class="form-group">
          <label class="form-label">Link / reference</label>
          <input type="text" id="f-link" placeholder="https://...">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Notes / context / guides</label>
          <div class="rich-editor-wrap">
            <div class="rich-toolbar" id="f-toolbar"></div>
            <div class="rich-editor" id="f-notes" contenteditable="true" placeholder="Background info, instructions, what to keep in mind..."></div>
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <label class="form-label">Steps (optional)</label>
        <div class="sub-add-row">
          <input type="text" id="f-sub" placeholder="Add a step and press Enter">
          <button class="add-sub-btn" onclick="addStep('f')">+ Add step</button>
        </div>
        <div class="steps-list" id="f-steps-list"></div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
        <button class="btn-save" onclick="saveTask()">Save task</button>
      </div>
    </div>

    <div id="board"></div>
  </div>
</div>

<div class="edit-overlay" id="edit-overlay" onclick="closeEditOverlay(event)">
  <div class="edit-modal">
    <div class="edit-modal-title">Edit task</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label class="form-label">Task title</label>
        <input type="text" id="e-title">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="e-cat" onchange="toggleRecur('e-cat','e-recur-row')">
          <option value="task">Quick task</option>
          <option value="project">Project</option>
          <option value="recurring">Recurring task</option>
          <option value="tracking">Tracking</option>
          <option value="idea">Future idea</option>
        </select>
      </div>
    </div>
    <div class="recur-row" id="e-recur-row" style="display:none">
      <span class="recur-label">How often does this repeat?</span>
      <select class="freq-select" id="e-freq">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Action owner</label>
        <select id="e-owner">
          <option value="mine">Action needed</option>
          <option value="theirs">Awaiting other's action</option>
          <option value="both">Collaborative progress</option>
          <option value="hold">On hold</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Energy needed</label>
        <select id="e-energy">
          <option value="med">Medium</option>
          <option value="high">High focus</option>
          <option value="low">Low effort</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due date</label>
        <input type="date" id="e-due">
      </div>
      <div class="form-group">
        <label class="form-label">Plan to do</label>
        <input type="date" id="e-plan">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label class="form-label">People involved</label>
        <input type="text" id="e-people" placeholder="e.g. Alex, Bruce, Ryan">
      </div>
      <div class="form-group">
        <label class="form-label">Link / reference</label>
        <input type="text" id="e-link" placeholder="https://...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Notes / context / guides</label>
        <div class="rich-editor-wrap">
          <div class="rich-toolbar" id="e-toolbar"></div>
          <div class="rich-editor" id="e-notes" contenteditable="true" placeholder="Background info, instructions, what to keep in mind..."></div>
        </div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">Steps</label>
      <div class="sub-add-row">
        <input type="text" id="e-sub" placeholder="Add a step and press Enter">
        <button class="add-sub-btn" onclick="addStep('e')">+ Add step</button>
      </div>
      <div class="steps-list" id="e-steps-list"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save changes</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwWOImRyEEeD02oBkjAx032e0Di8jSHEy0nQTW_jN_F2JRjPewxx-4UNp51Shor-x2Z/exec";
let tasks=[],idC=1,activeFilter='all',activeCats=new Set(),expandedId=null,syncing=false,editingId=null;
let fSteps=[],eSteps=[],sidebarCollapsed=false;

const MSGS_THEIRS=["You did your part. Now the waiting game begins.","Sent it off! Time to hydrate and wait.","Officially their problem for now. Respectable."];
const MSGS_BOTH=["Everyone's working on it — nice coordination energy!","It's a collab! Keep the momentum going."];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const ownerLabel={mine:"Action needed",theirs:"Awaiting other's action",both:"Collaborative progress",hold:"On hold"};
const ownerPill={mine:"pill-mine",theirs:"pill-theirs",both:"pill-both",hold:"pill-hold"};
const catLabel={task:"Quick task",project:"Project",recurring:"Recurring task",tracking:"Tracking",idea:"Future idea"};
const catClass={task:"cat-task",project:"cat-project",recurring:"cat-recurring",tracking:"cat-tracking",idea:"cat-idea"};
const energyLabel={high:"High focus",med:"Medium",low:"Low effort"};
const energyPill={high:"pill-high",med:"pill-med",low:"pill-low"};
const freqLabel={daily:"Daily",weekly:"Weekly",monthly:"Monthly"};
const PEOPLE_COLORS={alex:"background:var(--pk100);color:var(--pk800)",bruce:"background:var(--b100);color:var(--b800)",ryan:"background:var(--t100);color:var(--t600)",nate:"background:var(--pk100);color:var(--pk800)",matt:"background:var(--a100);color:var(--a600)",maria:"background:var(--a100);color:var(--a600)",jamie:"background:var(--c100);color:var(--c600)"};
const HIGHLIGHTS=["#FAC775","#9FE1CB","#B5D4F4","#F4C0D1","#C0DD97"];
const COLORS=["#D4537E","#378ADD","#1D9E75","#BA7517","#E24B4A","#1a1a18"];

function pColor(n){return PEOPLE_COLORS[n.trim().toLowerCase()]||"background:var(--r50);color:var(--r600)";}
function initials(n){const p=n.trim().split(/\s+/);return(p.length>1?p[0][0]+p[1][0]:n.trim().slice(0,2)).toUpperCase();}
function escH(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function toggleRecur(catId,rowId){document.getElementById(rowId).style.display=document.getElementById(catId).value==="recurring"?"flex":"none";}
function toggleSidebar(){sidebarCollapsed=!sidebarCollapsed;document.getElementById("sidebar").classList.toggle("collapsed",sidebarCollapsed);}

function buildToolbar(tbId,editorId){
  const tb=document.getElementById(tbId);
  const tools=[{cmd:"bold",label:"B",style:"font-weight:800"},{cmd:"italic",label:"I",style:"font-style:italic"},{cmd:"underline",label:"U",style:"text-decoration:underline"},{cmd:"strikeThrough",label:"S",style:"text-decoration:line-through"}];
  let h=tools.map(t=>`<button type="button" class="tb-btn" style="${t.style}" onmousedown="event.preventDefault();document.execCommand('${t.cmd}',false,null)">${t.label}</button>`).join("");
  h+=`<div class="tb-sep"></div>`;
  h+=`<button type="button" class="tb-btn" title="Bullet list" onmousedown="event.preventDefault();document.execCommand('insertUnorderedList',false,null)" style="font-size:14px">&#8226;</button>`;
  h+=`<button type="button" class="tb-btn" title="Numbered list" onmousedown="event.preventDefault();document.execCommand('insertOrderedList',false,null)" style="font-size:11px;font-weight:800">1.</button>`;
  h+=`<div class="tb-sep"></div>`;
  h+=`<select class="tb-select" onchange="applyColor('foreColor',this.value,'${editorId}');this.value=''"><option value="">Color</option>${COLORS.map(c=>`<option value="${c}" style="background:${c};color:#fff">${c}</option>`).join("")}</select>`;
  h+=`<select class="tb-select" onchange="applyColor('hiliteColor',this.value,'${editorId}');this.value=''"><option value="">Highlight</option>${HIGHLIGHTS.map(c=>`<option value="${c}" style="background:${c}">${c}</option>`).join("")}</select>`;
  h+=`<div class="tb-sep"></div><button type="button" class="tb-btn" style="font-size:11px" onmousedown="event.preventDefault();document.execCommand('removeFormat',false,null)">Aa</button>`;
  tb.innerHTML=h;
}
function applyColor(cmd,val,editorId){if(!val)return;document.getElementById(editorId).focus();document.execCommand(cmd,false,val);}

function addStep(prefix){
  const inp=document.getElementById(prefix+"-sub");const v=inp.value.trim();if(!v)return;
  (prefix==="f"?fSteps:eSteps).push({text:v,done:false,subs:[]});
  inp.value="";renderSteps(prefix);
}
function addSubStep(prefix,i){
  const inp=document.getElementById(prefix+"-ss-"+i);const v=inp.value.trim();if(!v)return;
  (prefix==="f"?fSteps:eSteps)[i].subs.push({text:v,done:false});
  inp.value="";renderSteps(prefix);
}
function removeStep(prefix,i){(prefix==="f"?fSteps:eSteps).splice(i,1);renderSteps(prefix);}
function removeSubStep(prefix,i,j){(prefix==="f"?fSteps:eSteps)[i].subs.splice(j,1);renderSteps(prefix);}
function renderSteps(prefix){
  const arr=prefix==="f"?fSteps:eSteps;
  document.getElementById(prefix+"-steps-list").innerHTML=arr.map((s,i)=>`
    <div class="step-item">
      <div class="step-main">
        <span style="color:var(--pk400);font-size:12px">&#9658;</span>
        <span style="flex:1">${escH(s.text)}</span>
        <button class="step-del" onclick="removeStep('${prefix}',${i})">&#x2715;</button>
      </div>
      <div class="substeps">
        ${s.subs.map((ss,j)=>`<div class="substep-item"><span style="color:var(--text3);font-size:11px">&#8627;</span><span style="flex:1">${escH(ss.text)}</span><button class="step-del" onclick="removeSubStep('${prefix}',${i},${j})">&#x2715;</button></div>`).join("")}
        <div class="substep-add-row">
          <input type="text" id="${prefix}-ss-${i}" placeholder="Add sub-step..." onkeydown="if(event.key==='Enter'){event.preventDefault();addSubStep('${prefix}',${i})}">
          <button class="substep-add-btn" onclick="addSubStep('${prefix}',${i})">+ Sub-step</button>
        </div>
      </div>
    </div>`).join("");
}

document.addEventListener("keydown",e=>{
  if(e.target.id==="f-sub"&&e.key==="Enter"){e.preventDefault();addStep("f");}
  if(e.target.id==="e-sub"&&e.key==="Enter"){e.preventDefault();addStep("e");}
  if(e.key==="Escape"&&document.getElementById("edit-overlay").classList.contains("open"))closeEdit();
});

async function loadFromSheet(){
  try{
    const r=await fetch(SCRIPT_URL+"?t="+Date.now(),{redirect:"follow"});
    const data=await r.json();
    if(Array.isArray(data)&&data.length){
      tasks=data.map(t=>({id:+t.id,title:t.title,cat:t.cat||t.type||"task",freq:t.freq||"",owner:t.owner,energy:t.energy,due:t.due||null,plan:t.plan||null,people:t.people?JSON.parse(t.people):[],notes:t.notes||"",link:t.link||"",subs:t.subs?JSON.parse(t.subs):[],done:t.done==="TRUE"||t.done===true,created:+t.created}));
      idC=Math.max(...tasks.map(x=>x.id))+1;
    }
  }catch(e){console.log("Load error",e);}
  render();suggest();
}
async function saveToSheet(){
  if(syncing)return;syncing=true;
  try{const enc=encodeURIComponent(JSON.stringify(tasks));await fetch(SCRIPT_URL+"?action=save&tasks="+enc,{mode:"no-cors"});}
  catch(e){console.log("Save error",e);}
  syncing=false;
}
function save(){saveToSheet();}

function daysUntil(ds){if(!ds)return null;const d=new Date(ds);const n=new Date();n.setHours(0,0,0,0);return Math.ceil((d-n)/864e5);}
function duePill(ds){if(!ds)return"";const d=daysUntil(ds);const cls=d<0?"pill-overdue":"pill-due";const txt=d<0?Math.abs(d)+"d overdue":d===0?"Due today":d===1?"Due tomorrow":"Due in "+d+"d";return`<span class="pill ${cls}">${txt}</span>`;}
function planPill(ds){if(!ds)return"";const d=daysUntil(ds);const txt=d<0?"Planned "+Math.abs(d)+"d ago":d===0?"Planned today":d===1?"Planned tomorrow":"Planned in "+d+"d";return`<span class="pill pill-plan">${txt}</span>`;}
function greeting(){const h=new Date().getHours();const g=h<12?"Good morning":h<17?"Good afternoon":"Good evening";const m=["Let's get something off that list today.","One task at a time — you've got this.","What are we tackling today?","Progress, not perfection.","Even one done is a win."];document.getElementById("greeting").textContent=g+"! "+rnd(m);}

function toggleForm(){
  const f=document.getElementById("add-form");const b=document.getElementById("add-toggle-btn");
  const isOpen=f.classList.toggle("open");
  b.textContent=isOpen?"— Close form":"+ Add a new task";
  if(isOpen)setTimeout(()=>document.getElementById("f-title").focus(),50);
}

function saveTask(){
  const title=document.getElementById("f-title").value.trim();if(!title)return;
  const cat=document.getElementById("f-cat").value;
  const freq=cat==="recurring"?document.getElementById("f-freq").value:"";
  const people=document.getElementById("f-people").value.trim().split(",").map(p=>p.trim()).filter(Boolean);
  tasks.push({id:idC++,title,cat,freq,owner:document.getElementById("f-owner").value,energy:document.getElementById("f-energy").value,due:document.getElementById("f-due").value||null,plan:document.getElementById("f-plan").value||null,people,notes:document.getElementById("f-notes").innerHTML,link:document.getElementById("f-link").value.trim(),subs:fSteps.map(s=>({...s,subs:[...s.subs]})),done:false,created:Date.now()});
  fSteps=[];
  ["f-title","f-link","f-people"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-due").value="";document.getElementById("f-plan").value="";
  document.getElementById("f-notes").innerHTML="";document.getElementById("f-cat").value="task";
  document.getElementById("f-owner").value="mine";document.getElementById("f-energy").value="med";
  document.getElementById("f-recur-row").style.display="none";
  renderSteps("f");save();render();suggest();toggleForm();
}

function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  if(t.cat==="recurring"&&!t.done){
    t.done=true;t.lastDone=new Date().toISOString().split("T")[0];t.due=nextDueDate(t.freq,t.due);
    save();render();suggest();
    setTimeout(()=>{t.done=false;save();render();suggest();},1500);
  } else {t.done=!t.done;save();render();suggest();}
}
function nextDueDate(freq,cur){const b=cur?new Date(cur):new Date();if(freq==="daily")b.setDate(b.getDate()+1);else if(freq==="weekly")b.setDate(b.getDate()+7);else b.setMonth(b.getMonth()+1);return b.toISOString().split("T")[0];}
function toggleSub(tid,si){const t=tasks.find(x=>x.id===tid);if(t&&t.subs[si])t.subs[si].done=!t.subs[si].done;save();render();}
function toggleSubSub(tid,si,ssi){const t=tasks.find(x=>x.id===tid);if(t&&t.subs[si]&&t.subs[si].subs[ssi])t.subs[si].subs[ssi].done=!t.subs[si].subs[ssi].done;save();render();}
function deleteTask(id){if(!confirm("Remove this task?"))return;tasks=tasks.filter(x=>x.id!==id);if(expandedId===id)expandedId=null;save();render();suggest();}
function toggleExpand(id){expandedId=expandedId===id?null:id;render();}

function editTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editingId=id;
  eSteps=t.subs?t.subs.map(s=>({...s,subs:s.subs?[...s.subs]:[]})):[];
  document.getElementById("e-title").value=t.title;
  document.getElementById("e-cat").value=t.cat||"task";
  document.getElementById("e-freq").value=t.freq||"daily";
  document.getElementById("e-recur-row").style.display=t.cat==="recurring"?"flex":"none";
  document.getElementById("e-owner").value=t.owner;
  document.getElementById("e-energy").value=t.energy;
  document.getElementById("e-due").value=t.due||"";
  document.getElementById("e-plan").value=t.plan||"";
  document.getElementById("e-people").value=t.people?t.people.join(", "):"";
  document.getElementById("e-link").value=t.link||"";
  document.getElementById("e-notes").innerHTML=t.notes||"";
  renderSteps("e");
  document.getElementById("edit-overlay").classList.add("open");
}
function closeEditOverlay(e){if(e.target===document.getElementById("edit-overlay"))closeEdit();}
function closeEdit(){document.getElementById("edit-overlay").classList.remove("open");editingId=null;}
function saveEdit(){
  const t=tasks.find(x=>x.id===editingId);if(!t)return;
  t.title=document.getElementById("e-title").value.trim()||t.title;
  t.cat=document.getElementById("e-cat").value;
  t.freq=t.cat==="recurring"?document.getElementById("e-freq").value:"";
  t.owner=document.getElementById("e-owner").value;
  t.energy=document.getElementById("e-energy").value;
  t.due=document.getElementById("e-due").value||null;
  t.plan=document.getElementById("e-plan").value||null;
  t.people=document.getElementById("e-people").value.trim().split(",").map(p=>p.trim()).filter(Boolean);
  t.link=document.getElementById("e-link").value.trim();
  t.notes=document.getElementById("e-notes").innerHTML;
  t.subs=eSteps.map(s=>({...s,subs:[...s.subs]}));
  closeEdit();save();render();suggest();
}

function suggest(){
  const open=tasks.filter(x=>!x.done);
  if(!open.length){document.getElementById("nudge-msg").textContent="All done! Nothing left — time to celebrate or add more tasks.";return;}
  const overdue=open.filter(x=>x.due&&daysUntil(x.due)<0);
  const today=open.filter(x=>x.due&&daysUntil(x.due)===0);
  const myMove=open.filter(x=>x.owner==="mine");
  const waiting=open.filter(x=>x.owner==="theirs");
  const both=open.filter(x=>x.owner==="both");
  let msg="";
  if(overdue.length)msg=`Heads up — "${overdue[0].title}" is overdue! That's first on the list, no arguments.`;
  else if(today.length&&today.some(x=>x.owner==="mine")){const t=today.find(x=>x.owner==="mine");msg=`"${t.title}" is due TODAY and it's your move. Go go go.`;}
  else if(myMove.length)msg=`${myMove.length} task${myMove.length>1?"s need":" needs"} YOUR action. Start with "${myMove[0].title}" — ${myMove[0].energy==="low"?"it's a quick one!":myMove[0].energy==="high"?"grab a coffee first.":"you've got this."}`;
  else if(both.length)msg=`"${both[0].title}" is in collaborative progress — check in and keep it moving. ${rnd(MSGS_BOTH)}`;
  else if(waiting.length)msg=`${waiting.length} item${waiting.length>1?"s are":" is"} awaiting other's action. ${rnd(MSGS_THEIRS)} Maybe follow up on "${waiting[0].title}"?`;
  else{const pick=open[Math.floor(Math.random()*Math.min(3,open.length))];msg=`No fires today! "${pick.title}" could be a good one to pick up.`;}
  document.getElementById("nudge-msg").textContent=msg;
}

function setFilter(f){activeFilter=f;activeCats.clear();render();}
function toggleCat(cat){
  if(activeCats.has(cat))activeCats.delete(cat);else activeCats.add(cat);
  activeFilter=activeCats.size>0?"multi-cat":"all";
  render();
}

function renderSidebar(){
  const open=tasks.filter(x=>!x.done);
  const counts={all:open.length,mine:open.filter(x=>x.owner==="mine").length,theirs:open.filter(x=>x.owner==="theirs").length,both:open.filter(x=>x.owner==="both").length,hold:open.filter(x=>x.owner==="hold").length,done:tasks.filter(x=>x.done).length,today:open.filter(x=>x.due&&daysUntil(x.due)===0).length,"this-week":open.filter(x=>{const d=daysUntil(x.due);return x.due&&d>=0&&d<=6;}).length,"planned-today":open.filter(x=>x.plan&&daysUntil(x.plan)===0).length,"planned-week":open.filter(x=>{const d=daysUntil(x.plan);return x.plan&&d>=0&&d<=6;}).length};
  const catCounts={task:open.filter(x=>x.cat==="task").length,project:open.filter(x=>x.cat==="project").length,recurring:open.filter(x=>x.cat==="recurring").length,tracking:open.filter(x=>x.cat==="tracking").length,idea:open.filter(x=>x.cat==="idea").length};
  const catActiveBg={task:"var(--b400)",project:"var(--pk400)",recurring:"var(--t400)",tracking:"var(--a400)",idea:"var(--c400)"};
  const catActiveColor={task:"#fff",project:"#fff",recurring:"#fff",tracking:"#fff",idea:"#fff"};

  const groups=[
    {label:"Overview",items:[
      {key:"all",icon:"&#9776;",label:"All tasks",color:"var(--pk400)"},
      {key:"done",icon:"&#10003;",label:"Completed",color:"var(--g400)"},
    ]},
    {label:"By ownership",items:[
      {key:"mine",icon:"&#9654;",label:"Action needed",color:"var(--pk400)"},
      {key:"theirs",icon:"&#8987;",label:"Awaiting others",color:"var(--b400)"},
      {key:"both",icon:"&#9900;",label:"Collab progress",color:"var(--a400)"},
      {key:"hold",icon:"&#8214;",label:"On hold",color:"var(--c400)"},
    ]},
    {label:"By date",items:[
      {key:"today",icon:"&#9888;",label:"Due today",color:"var(--r400)"},
      {key:"this-week",icon:"&#128197;",label:"Due this week",color:"var(--a400)"},
      {key:"planned-today",icon:"&#9998;",label:"Planned today",color:"var(--b400)"},
      {key:"planned-week",icon:"&#128336;",label:"Planned this week",color:"var(--t400)"},
    ]},
  ];

  let html=groups.map(g=>`
    <div class="filter-group">
      <div class="filter-group-label">${g.label}</div>
      ${g.items.map(item=>{
        const isActive=activeFilter===item.key;
        return`<button class="filter-btn ${isActive?"active":""}" onclick="setFilter('${item.key}')" title="${item.label}" style="${isActive?`background:${item.color}20`:""}">
          <div class="f-icon" style="background:${item.color};color:#fff">${item.icon}</div>
          <span class="f-label">${item.label}</span>
          ${counts[item.key]!==undefined?`<span class="f-count">${counts[item.key]}</span>`:""}
        </button>`;
      }).join("")}
    </div>
    <div class="sidebar-sep"></div>
  `).join("");

  html+=`<div class="cat-multi-wrap">
    <div class="cat-multi-label">By category <span style="font-weight:600;opacity:.7">(multi)</span></div>
    <div class="cat-pill-row">
      ${[["task","&#9670; Quick tasks"],["project","&#9632; Projects"],["recurring","&#8635; Recurring"],["tracking","&#128200; Tracking"],["idea","&#128161; Ideas"]].map(([k,l])=>{
        const active=activeCats.has(k);
        return`<button class="cat-btn ${active?"active-cat":""}" onclick="toggleCat('${k}')" title="${catLabel[k]}" style="${active?`color:${catActiveBg[k]};background:${catActiveBg[k]}18`:""}">
          <span style="font-size:12px;flex-shrink:0">${l.split(" ")[0]}</span>
          <span class="f-label">${l.split(" ").slice(1).join(" ")}${active?" ✓":""}</span>
          <span class="f-count" style="${active?`background:${catActiveBg[k]};color:#fff`:""}">${catCounts[k]}</span>
        </button>`;
      }).join("")}
    </div>
  </div>`;

  document.getElementById("sidebar-content").innerHTML=html;
}

function render(){
  const done=tasks.filter(x=>x.done).length;
  const total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById("progfill").style.width=pct+"%";
  document.getElementById("progtxt").textContent=pct+"% done";
  const open=tasks.filter(x=>!x.done);
  document.getElementById("stats").innerHTML=`
    <div class="stat stat-mine ${activeFilter==="mine"?"active-filter":""}" onclick="setFilter('mine')"><div class="stat-n">${open.filter(x=>x.owner==="mine").length}</div><div class="stat-l">Action needed</div></div>
    <div class="stat stat-theirs ${activeFilter==="theirs"?"active-filter":""}" onclick="setFilter('theirs')"><div class="stat-n">${open.filter(x=>x.owner==="theirs").length}</div><div class="stat-l">Awaiting others</div></div>
    <div class="stat stat-both ${activeFilter==="both"?"active-filter":""}" onclick="setFilter('both')"><div class="stat-n">${open.filter(x=>x.owner==="both").length}</div><div class="stat-l">Collab progress</div></div>
    <div class="stat stat-done ${activeFilter==="done"?"active-filter":""}" onclick="setFilter('done')"><div class="stat-n">${done}</div><div class="stat-l">Completed</div></div>`;

  renderSidebar();

  let visible=tasks.filter(t=>{
    if(activeFilter==="all")return!t.done;
    if(activeFilter==="done")return t.done;
    if(activeFilter==="multi-cat")return activeCats.has(t.cat)&&!t.done;
    if(activeFilter==="today")return t.due&&daysUntil(t.due)===0&&!t.done;
    if(activeFilter==="this-week"){const d=daysUntil(t.due);return t.due&&d>=0&&d<=6&&!t.done;}
    if(activeFilter==="planned-today")return t.plan&&daysUntil(t.plan)===0&&!t.done;
    if(activeFilter==="planned-week"){const d=daysUntil(t.plan);return t.plan&&d>=0&&d<=6&&!t.done;}
    return t.owner===activeFilter&&!t.done;
  });
  visible=[...visible].sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const p={mine:0,both:1,theirs:2,hold:3};
    if(p[a.owner]!==p[b.owner])return p[a.owner]-p[b.owner];
    const da=a.due?daysUntil(a.due):999,db=b.due?daysUntil(b.due):999;
    return da-db;
  });

  const secs=[
    {key:"recurring",label:"Recurring tasks",dot:"dot-recurring",fn:x=>x.cat==="recurring"&&!x.done},
    {key:"mine",label:"Action needed",dot:"dot-mine",fn:x=>x.owner==="mine"&&!x.done&&x.cat!=="recurring"&&x.cat!=="idea"},
    {key:"both",label:"Collaborative progress",dot:"dot-both",fn:x=>x.owner==="both"&&!x.done&&x.cat!=="recurring"&&x.cat!=="idea"},
    {key:"theirs",label:"Awaiting other's action",dot:"dot-theirs",fn:x=>x.owner==="theirs"&&!x.done&&x.cat!=="recurring"&&x.cat!=="idea"},
    {key:"hold",label:"On hold",dot:"dot-hold",fn:x=>x.owner==="hold"&&!x.done&&x.cat!=="idea"},
    {key:"idea",label:"Future ideas",dot:"dot-idea",fn:x=>x.cat==="idea"&&!x.done},
    {key:"done",label:"Completed",dot:"",fn:x=>x.done&&x.cat!=="recurring"},
  ];

  let html="";
  for(const sec of secs){
    const items=visible.filter(sec.fn);
    if(!items.length)continue;
    const show=activeFilter==="all"||activeFilter==="multi-cat"||activeFilter===sec.key||activeFilter==="done"||["today","this-week","planned-today","planned-week"].includes(activeFilter);
    if(!show)continue;
    if(activeFilter==="done"&&sec.key!=="done")continue;
    html+=`<div class="section"><div class="section-head"><div class="section-title"><div class="dot ${sec.dot}"></div>${sec.label}</div><div class="section-count">${items.length}</div></div>`;
    for(const t of items){
      const exp=expandedId===t.id;
      const hasSubs=t.subs&&t.subs.length>0;
      const hasD=t.notes||t.link||hasSubs||(t.people&&t.people.length);
      const isRecur=t.cat==="recurring";
      html+=`<div class="card ${t.done?"done":""} ${isRecur?"recurring-card":""}">
        <div class="card-main">
          <div class="chk ${t.done?"on":""}" onclick="toggleDone(${t.id})"></div>
          <div class="card-body" onclick="toggleExpand(${t.id})">
            <div class="card-title">${escH(t.title)}</div>
            <div class="card-meta">
              <span class="pill ${catClass[t.cat]||"cat-task"}">${catLabel[t.cat]||t.cat}</span>
              ${isRecur&&t.freq?`<span class="pill pill-freq">${freqLabel[t.freq]||t.freq}</span>`:""}
              <span class="pill ${ownerPill[t.owner]}">${ownerLabel[t.owner]}</span>
              <span class="pill ${energyPill[t.energy]}">${energyLabel[t.energy]}</span>
              ${duePill(t.due)}${planPill(t.plan)}
              ${t.people&&t.people.length?t.people.slice(0,2).map(p=>`<span class="pill pill-person">${escH(p)}</span>`).join(""):""}
            </div>
            ${isRecur&&t.lastDone?`<div class="recur-done-note">Last completed: ${t.lastDone} — next due: ${t.due||"not set"}</div>`:""}
          </div>
          <div class="card-actions">
            <button class="card-action-btn edit-btn" onclick="editTask(${t.id})" title="Edit">&#9998;</button>
            <button class="card-action-btn del-btn" onclick="deleteTask(${t.id})" title="Remove">&#128465;</button>
            ${hasD?`<button class="card-action-btn exp-btn" onclick="toggleExpand(${t.id})" title="Expand">${exp?"&#9650;":"&#9660;"}</button>`:`<div style="width:32px"></div>`}
          </div>
        </div>`;
      if(hasD){
        html+=`<div class="card-detail ${exp?"open":""}">`;
        if(t.notes)html+=`<div class="detail-section"><div class="detail-label">Notes &amp; context</div><div class="detail-content">${t.notes}</div></div>`;
        if(hasSubs){
          html+=`<div class="detail-section"><div class="detail-label">Steps</div><div style="display:flex;flex-direction:column;gap:6px">`;
          t.subs.forEach((s,i)=>{
            html+=`<div class="card-step"><div class="card-step-main"><div class="sub-chk ${s.done?"on":""}" onclick="toggleSub(${t.id},${i})"></div><span class="${s.done?"sub-done":""}">${escH(s.text)}</span></div>`;
            if(s.subs&&s.subs.length)s.subs.forEach((ss,j)=>{html+=`<div class="card-substep"><div class="sub-chk sm ${ss.done?"on":""}" onclick="toggleSubSub(${t.id},${i},${j})"></div><span class="${ss.done?"sub-done":""}">${escH(ss.text)}</span></div>`;});
            html+=`</div>`;
          });
          html+=`</div></div>`;
        }
        if(t.people&&t.people.length)html+=`<div class="detail-section"><div class="detail-label">People involved</div><div class="people-row">${t.people.map(p=>`<div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="${pColor(p)}">${initials(p)}</div><span class="person-name">${escH(p)}</span></div>`).join("")}</div></div>`;
        if(t.link)html+=`<div class="detail-section"><div class="detail-label">Reference / link</div><a class="link-item" href="${escH(t.link)}" target="_blank">${escH(t.link)}</a></div>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  document.getElementById("board").innerHTML=html||`<div class="empty-state">${activeFilter==="done"?"No completed tasks yet — go get that first checkmark!":"Nothing here yet. Add a task to get started!"}</div>`;
}

greeting();
buildToolbar("f-toolbar","f-notes");
buildToolbar("e-toolbar","e-notes");
loadFromSheet();
</script>
</body>
</html>
