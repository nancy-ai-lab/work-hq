<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nancy's Work HQ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#fafaf9;--bg2:#f3f2ee;--bg3:#eceae4;
--text:#1a1a18;--text2:#5f5e5a;--text3:#9b9994;
--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
--p50:#EEEDFE;--p100:#CECBF6;--p400:#7F77DD;--p600:#534AB7;--p800:#3C3489;
--t50:#E1F5EE;--t100:#9FE1CB;--t400:#1D9E75;--t600:#0F6E56;
--pk50:#FBEAF0;--pk100:#F4C0D1;--pk400:#D4537E;--pk600:#993556;--pk800:#72243E;
--a50:#FAEEDA;--a100:#FAC775;--a400:#BA7517;--a600:#854F0B;
--c50:#F1EFE8;--c100:#D3D1C7;--c400:#888780;--c600:#5F5E5A;
--b50:#E6F1FB;--b100:#B5D4F4;--b400:#378ADD;--b600:#185FA5;--b800:#0C447C;
--g50:#EAF3DE;--g100:#C0DD97;--g400:#639922;--g600:#3B6D11;
--r50:#FCEBEB;--r100:#F7C1C1;--r400:#E24B4A;--r600:#A32D2D;
--radius:10px;--radius-sm:6px;--radius-pill:99px;
}
@media(prefers-color-scheme:dark){
:root{
--bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
--text:#f0ede8;--text2:#a8a49e;--text3:#6b6760;
--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
--p50:#26215C;--p100:#3C3489;--p400:#7F77DD;--p600:#AFA9EC;--p800:#CECBF6;
--t50:#04342C;--t100:#085041;--t400:#1D9E75;--t600:#5DCAA5;
--pk50:#4B1528;--pk100:#72243E;--pk400:#D4537E;--pk600:#ED93B1;--pk800:#F4C0D1;
--a50:#412402;--a100:#633806;--a400:#BA7517;--a600:#EF9F27;
--c50:#2C2C2A;--c100:#444441;--c400:#888780;--c600:#B4B2A9;
--b50:#042C53;--b100:#0C447C;--b400:#378ADD;--b600:#85B7EB;--b800:#B5D4F4;
--g50:#173404;--g100:#27500A;--g400:#639922;--g600:#97C459;
--r50:#501313;--r100:#791F1F;--r400:#E24B4A;--r600:#F09595;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.container{max-width:820px;margin:0 auto;padding:1.5rem 1rem 4rem}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.app-title{font-size:22px;font-weight:600;color:var(--text)}
.app-sub{font-size:13px;color:var(--text2);margin-top:3px}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-top:4px}
.prog-bar{width:150px;height:8px;background:var(--bg3);border-radius:99px;overflow:hidden;border:0.5px solid var(--border)}
.prog-fill{height:100%;background:var(--p400);border-radius:99px;transition:width .5s}
.prog-txt{font-size:12px;color:var(--text3)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.stat{border-radius:var(--radius);padding:12px 14px;border:0.5px solid var(--border)}
.stat-n{font-size:22px;font-weight:600}
.stat-l{font-size:11px;margin-top:3px}
.stat-mine{background:var(--p50);border-color:var(--p100)}.stat-mine .stat-n{color:var(--p800)}.stat-mine .stat-l{color:var(--p600)}
.stat-theirs{background:var(--b50);border-color:var(--b100)}.stat-theirs .stat-n{color:var(--b800)}.stat-theirs .stat-l{color:var(--b600)}
.stat-both{background:var(--a50);border-color:var(--a100)}.stat-both .stat-n{color:var(--a600)}.stat-both .stat-l{color:var(--a400)}
.stat-done{background:var(--g50);border-color:var(--g100)}.stat-done .stat-n{color:var(--g600)}.stat-done .stat-l{color:var(--g400)}
.nudge{background:var(--p50);border:0.5px solid var(--p100);border-radius:var(--radius);padding:14px 16px;margin-bottom:1.25rem}
.nudge-label{font-size:10px;font-weight:600;letter-spacing:.07em;color:var(--p600);text-transform:uppercase;margin-bottom:5px}
.nudge-msg{font-size:13px;color:var(--p800);line-height:1.6}
.nudge-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.nudge-btn{font-size:12px;padding:5px 14px;border-radius:99px;background:var(--p100);color:var(--p800);border:none;cursor:pointer}
.nudge-btn:hover{background:var(--p400);color:#fff}
.add-toggle{font-size:13px;padding:7px 18px;border-radius:99px;border:0.5px solid var(--p400);background:transparent;color:var(--p600);cursor:pointer;margin-bottom:1.25rem;font-weight:500}
.add-toggle:hover{background:var(--p50)}
.add-form{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:1.5rem;border:0.5px solid var(--border);display:none}
.add-form.open{display:block}
.form-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;flex:1;min-width:140px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
input[type=text],input[type=date],select,textarea{background:var(--bg);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;font-family:inherit;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--p400);box-shadow:0 0 0 2px var(--p100)}
textarea{resize:vertical;min-height:64px}
.sub-add-row{display:flex;gap:6px;margin-top:6px}
.sub-add-row input{flex:1}
.add-sub-btn{font-size:12px;padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
.add-sub-btn:hover{background:var(--bg3)}
.pending-subs{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.psub{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.psub-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn-save{font-size:13px;padding:7px 20px;border-radius:99px;background:var(--p400);color:#fff;border:none;cursor:pointer;font-weight:500}
.btn-save:hover{background:var(--p600)}
.btn-cancel{font-size:13px;padding:7px 16px;border-radius:99px;background:transparent;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer}
.filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.filter-pill{font-size:12px;padding:4px 13px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.filter-pill:hover{background:var(--bg2)}
.filter-pill.f-all,.filter-pill.f-mine{background:var(--p400);color:#fff;border-color:var(--p400)}
.filter-pill.f-theirs{background:var(--b400);color:#fff;border-color:var(--b400)}
.filter-pill.f-both{background:var(--a400);color:#fff;border-color:var(--a400)}
.filter-pill.f-hold{background:var(--c400);color:#fff;border-color:var(--c400)}
.filter-pill.f-idea{background:var(--pk400);color:#fff;border-color:var(--pk400)}
.filter-pill.f-done{background:var(--g400);color:#fff;border-color:var(--g400)}
.section{margin-bottom:1.5rem}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;color:var(--text)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-mine{background:var(--p400)}.dot-theirs{background:var(--b400)}.dot-both{background:var(--a400)}.dot-hold{background:var(--c400)}.dot-idea{background:var(--pk400)}
.section-count{font-size:11px;color:var(--text3)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:var(--border2)}
.card.done{opacity:.5}
.card-main{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk.on{background:var(--g400);border-color:var(--g400)}
.chk.on::after{content:'';display:block;width:5px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
.card-body{flex:1;min-width:0}
.card-title{font-size:14px;color:var(--text);font-weight:500;line-height:1.4;word-break:break-word}
.card.done .card-title{text-decoration:line-through;color:var(--text3)}
.card-meta{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.pill{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;white-space:nowrap}
.pill-mine{background:var(--p50);color:var(--p800)}
.pill-theirs{background:var(--b50);color:var(--b800)}
.pill-both{background:var(--a50);color:var(--a600)}
.pill-hold{background:var(--c50);color:var(--c600)}
.pill-high{background:var(--r50);color:var(--r600)}
.pill-med{background:var(--a50);color:var(--a600)}
.pill-low{background:var(--g50);color:var(--g600)}
.pill-due{background:var(--pk50);color:var(--pk800)}
.pill-overdue{background:var(--r50);color:var(--r600)}
.pill-person{background:var(--t50);color:var(--t600)}
.pill-type{background:var(--pk50);color:var(--pk800)}
.expand-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;flex-shrink:0;padding:2px 6px;margin-top:1px}
.expand-btn:hover{color:var(--text)}
.card-detail{padding:0 14px 14px 42px;display:none;flex-direction:column;gap:10px}
.card-detail.open{display:flex}
.detail-section{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px}
.detail-label{font-size:10px;font-weight:600;letter-spacing:.07em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.detail-content{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.subtask-list{display:flex;flex-direction:column;gap:5px}
.subtask{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.sub-chk{width:14px;height:14px;border-radius:3px;border:1px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sub-chk.on{background:var(--p400);border-color:var(--p400)}
.sub-chk.on::after{content:'';display:block;width:4px;height:6px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
.sub-done{text-decoration:line-through;color:var(--text3)}
.people-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.person-name{font-size:12px;color:var(--text2)}
.link-item{font-size:12px;color:var(--b600);word-break:break-all;text-decoration:none}
.link-item:hover{text-decoration:underline}
.detail-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.det-btn{font-size:12px;padding:5px 12px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.det-btn:hover{background:var(--bg2)}
.det-btn.danger:hover{background:var(--r50);color:var(--r600);border-color:var(--r600)}
.empty-state{padding:2.5rem;text-align:center;color:var(--text3);font-size:13px;background:var(--bg2);border-radius:var(--radius)}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <div class="app-title">Nancy's Work HQ</div>
      <div class="app-sub" id="greeting"></div>
    </div>
    <div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="progfill" style="width:0%"></div></div>
        <span class="prog-txt" id="progtxt">0% done</span>
      </div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="nudge">
    <div class="nudge-label">what's next for you</div>
    <div class="nudge-msg" id="nudge-msg">Add some tasks and I'll figure out where you should start.</div>
    <div class="nudge-actions">
      <button class="nudge-btn" onclick="suggest()">Refresh suggestion</button>
    </div>
  </div>

  <button class="add-toggle" id="add-toggle-btn" onclick="toggleForm()">+ Add a new task</button>

  <div class="add-form" id="add-form">
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label class="form-label">Task title</label>
        <input type="text" id="f-title" placeholder="What needs doing?">
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="f-type">
          <option value="todo" selected>Quick to-do</option>
          <option value="project">Project</option>
          <option value="idea">Someday / idea</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Action owner</label>
        <select id="f-owner">
          <option value="mine">My action</option>
          <option value="theirs">Waiting on someone</option>
          <option value="both">Both in progress</option>
          <option value="hold">On hold</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Energy needed</label>
        <select id="f-energy">
          <option value="med" selected>Medium</option>
          <option value="high">High focus</option>
          <option value="low">Low effort</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Due date</label>
        <input type="date" id="f-due">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label class="form-label">People involved</label>
        <input type="text" id="f-people" placeholder="e.g. Alex, Bruce, Ryan">
      </div>
      <div class="form-group">
        <label class="form-label">Link / reference</label>
        <input type="text" id="f-link" placeholder="https://...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Notes / context / guides</label>
        <textarea id="f-notes" placeholder="Background info, instructions, what to keep in mind..."></textarea>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label class="form-label">Steps (optional)</label>
      <div class="sub-add-row">
        <input type="text" id="f-sub" placeholder="Type a step and press Enter or click Add">
        <button class="add-sub-btn" onclick="addPendingSub()">+ Add step</button>
      </div>
      <div class="pending-subs" id="pending-subs"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save task</button>
    </div>
  </div>

  <div class="filter-row" id="filters"></div>
  <div id="board"></div>
</div>

<script>
let tasks=[],idC=1,pendSubs=[],activeFilter='all',expandedId=null;
const MSGS_MINE=["Your move — no pressure, but also... a little pressure.","Ball's in your court. You got this!","This one's waiting on YOU. No ghosting allowed.","Action needed from the star of the show — that's you.","Time to be the hero of your own to-do list."];
const MSGS_THEIRS=["You did your part. Now the waiting game begins.","Sent it off! Time to hydrate and wait.","Officially their problem for now. Respectable.","You've done your bit. Gold star pending."];
const MSGS_BOTH=["Everyone's working on it — nice coordination energy!","It's a collab! Keep the momentum going.","Both sides in motion. Teamwork makes the dream work."];
const MSGS_CLEAR=["Nothing here! Either you're crushing it or this filter is empty.","All clear in this zone! Love to see it.","Inbox zero vibes. Now go add more things to do. 😄"];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const ownerLabel={mine:"My action",theirs:"Waiting on them",both:"Both in progress",hold:"On hold"};
const ownerPill={mine:"pill-mine",theirs:"pill-theirs",both:"pill-both",hold:"pill-hold"};
const typeLabel={project:"Project",todo:"Quick to-do",idea:"Someday"};
const energyLabel={high:"High focus",med:"Medium",low:"Low effort"};
const energyPill={high:"pill-high",med:"pill-med",low:"pill-low"};
const PEOPLE_COLORS={alex:"background:var(--p100);color:var(--p800)",bruce:"background:var(--b100);color:var(--b800)",ryan:"background:var(--t100);color:var(--t600)",nate:"background:var(--pk100);color:var(--pk800)",matt:"background:var(--a100);color:var(--a600)",maria:"background:var(--a100);color:var(--a600)",jamie:"background:var(--c100);color:var(--c600)"};
function pColor(n){return PEOPLE_COLORS[n.trim().toLowerCase()]||"background:var(--r50);color:var(--r600)";}
function initials(n){const p=n.trim().split(/\s+/);return(p.length>1?p[0][0]+p[1][0]:n.trim().slice(0,2)).toUpperCase();}
function save(){try{localStorage.setItem("nhq2_t",JSON.stringify(tasks));localStorage.setItem("nhq2_id",String(idC));}catch(e){}}
function load(){try{const d=localStorage.getItem("nhq2_t");const i=localStorage.getItem("nhq2_id");if(d){tasks=JSON.parse(d);idC=i?+i:tasks.length+1;}}catch(e){}}
function daysUntil(ds){if(!ds)return null;const d=new Date(ds);const n=new Date();n.setHours(0,0,0,0);return Math.ceil((d-n)/864e5);}
function duePill(ds){if(!ds)return"";const d=daysUntil(ds);const cls=d<0?"pill-overdue":"pill-due";const txt=d<0?Math.abs(d)+"d overdue":d===0?"Due today":d===1?"Due tomorrow":"Due in "+d+"d";return`<span class="pill ${cls}">${txt}</span>`;}
function greeting(){const h=new Date().getHours();const g=h<12?"Good morning":h<17?"Good afternoon":"Good evening";const m=["Let's get something off that list today.","One task at a time — you've got this.","What are we tackling today?","Progress, not perfection.","Even one done is a win."];document.getElementById("greeting").textContent=g+"! "+rnd(m);}
function toggleForm(){const f=document.getElementById("add-form");const b=document.getElementById("add-toggle-btn");const isOpen=f.classList.toggle("open");b.textContent=isOpen?"— Close form":"+ Add a new task";if(isOpen)setTimeout(()=>document.getElementById("f-title").focus(),50);}
function addPendingSub(){const inp=document.getElementById("f-sub");const v=inp.value.trim();if(!v)return;pendSubs.push({text:v,done:false});inp.value="";renderPendSubs();}
document.addEventListener("keydown",e=>{if(e.target.id==="f-sub"&&e.key==="Enter"){e.preventDefault();addPendingSub();}if(e.key==="Escape")document.getElementById("add-form").classList.contains("open")&&toggleForm();});
function removePendSub(i){pendSubs.splice(i,1);renderPendSubs();}
function renderPendSubs(){document.getElementById("pending-subs").innerHTML=pendSubs.map((s,i)=>`<div class="psub"><span style="color:var(--p400);font-size:11px">&#9658;</span>${escH(s.text)}<button class="psub-del" onclick="removePendSub(${i})">&#x2715;</button></div>`).join("");}
function saveTask(){const title=document.getElementById("f-title").value.trim();if(!title)return;const people=document.getElementById("f-people").value.trim().split(",").map(p=>p.trim()).filter(Boolean);tasks.push({id:idC++,title,type:document.getElementById("f-type").value,owner:document.getElementById("f-owner").value,energy:document.getElementById("f-energy").value,due:document.getElementById("f-due").value||null,people,notes:document.getElementById("f-notes").value.trim(),link:document.getElementById("f-link").value.trim(),subs:pendSubs.map(s=>({...s})),done:false,created:Date.now()});pendSubs=[];["f-title","f-notes","f-link","f-people"].forEach(id=>document.getElementById(id).value="");document.getElementById("f-due").value="";document.getElementById("f-type").value="todo";document.getElementById("f-owner").value="mine";document.getElementById("f-energy").value="med";renderPendSubs();save();render();suggest();toggleForm();}
function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t)t.done=!t.done;save();render();suggest();}
function toggleSub(tid,si){const t=tasks.find(x=>x.id===tid);if(t&&t.subs[si])t.subs[si].done=!t.subs[si].done;save();render();}
function deleteTask(id){if(!confirm("Remove this task?"))return;tasks=tasks.filter(x=>x.id!==id);if(expandedId===id)expandedId=null;save();render();suggest();}
function toggleExpand(id){expandedId=expandedId===id?null:id;render();}
function suggest(){const open=tasks.filter(x=>!x.done);if(!open.length){document.getElementById("nudge-msg").textContent="All done! Nothing left — time to celebrate or add more tasks.";return;}const overdue=open.filter(x=>x.due&&daysUntil(x.due)<0);const today=open.filter(x=>x.due&&daysUntil(x.due)===0);const myMove=open.filter(x=>x.owner==="mine");const waiting=open.filter(x=>x.owner==="theirs");const both=open.filter(x=>x.owner==="both");let msg="";if(overdue.length){msg=`Heads up — "${overdue[0].title}" is overdue! That's first on the list, no arguments.`;}else if(today.length&&today.some(x=>x.owner==="mine")){const t=today.find(x=>x.owner==="mine");msg=`"${t.title}" is due TODAY and it's your move. Go go go.`;}else if(myMove.length){msg=`${myMove.length} task${myMove.length>1?"s need":"needs"} YOUR action. Start with "${myMove[0].title}" — ${myMove[0].energy==="low"?"it's a quick one!":myMove[0].energy==="high"?"grab a coffee first.":"you've got this."}`;}else if(both.length){msg=`"${both[0].title}" is a collab in progress — check in and keep it moving. ${rnd(MSGS_BOTH)}`;}else if(waiting.length){msg=`${waiting.length} item${waiting.length>1?"s are":" is"} waiting on someone else. ${rnd(MSGS_THEIRS)} Maybe follow up on "${waiting[0].title}"?`;}else{const pick=open[Math.floor(Math.random()*Math.min(3,open.length))];msg=`No fires today! Pick something from your list. "${pick.title}" could be a good one.`;}document.getElementById("nudge-msg").textContent=msg;}
function setFilter(f){activeFilter=f;render();}
function render(){const done=tasks.filter(x=>x.done).length;const total=tasks.length;const pct=total?Math.round(done/total*100):0;document.getElementById("progfill").style.width=pct+"%";document.getElementById("progtxt").textContent=pct+"% done";const open=tasks.filter(x=>!x.done);document.getElementById("stats").innerHTML=`<div class="stat stat-mine"><div class="stat-n">${open.filter(x=>x.owner==="mine").length}</div><div class="stat-l">My action</div></div><div class="stat stat-theirs"><div class="stat-n">${open.filter(x=>x.owner==="theirs").length}</div><div class="stat-l">Waiting on them</div></div><div class="stat stat-both"><div class="stat-n">${open.filter(x=>x.owner==="both").length}</div><div class="stat-l">Both in progress</div></div><div class="stat stat-done"><div class="stat-n">${done}</div><div class="stat-l">Completed</div></div>`;
const filters=[["all","All tasks"],["mine","My action"],["theirs","Waiting on them"],["both","Both sides"],["hold","On hold"],["idea","Someday"],["done","Done"]];
document.getElementById("filters").innerHTML=filters.map(([k,l])=>`<button class="filter-pill ${activeFilter===k?"f-"+k:""}" onclick="setFilter('${k}')">${l}</button>`).join("");
let visible=tasks.filter(t=>{if(activeFilter==="all")return!t.done;if(activeFilter==="done")return t.done;if(activeFilter==="idea")return t.type==="idea"&&!t.done;return t.owner===activeFilter&&!t.done;});
visible=[...visible].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const p={mine:0,both:1,theirs:2,hold:3};if(p[a.owner]!==p[b.owner])return p[a.owner]-p[b.owner];const da=a.due?daysUntil(a.due):999,db=b.due?daysUntil(b.due):999;return da-db;});
const secs=[{key:"mine",label:"My action",dot:"dot-mine"},{key:"both",label:"Both in progress",dot:"dot-both"},{key:"theirs",label:"Waiting on them",dot:"dot-theirs"},{key:"hold",label:"On hold",dot:"dot-hold"},{key:"idea",label:"Someday / ideas",dot:"dot-idea"},{key:"done",label:"Completed",dot:""}];
let html="";
for(const sec of secs){const items=sec.key==="done"?visible.filter(x=>x.done):sec.key==="idea"?visible.filter(x=>x.type==="idea"&&!x.done&&x.owner!=="hold"):visible.filter(x=>x.owner===sec.key&&!x.done&&x.type!=="idea");if(!items.length)continue;if(activeFilter!=="all"&&activeFilter!=="done"&&activeFilter!==sec.key&&!(activeFilter==="idea"&&sec.key==="idea"))continue;if(activeFilter==="done"&&sec.key!=="done")continue;
html+=`<div class="section"><div class="section-head"><div class="section-title"><div class="dot ${sec.dot}"></div>${sec.label}</div><div class="section-count">${items.length}</div></div>`;
for(const t of items){const exp=expandedId===t.id;const hasD=t.notes||t.link||(t.subs&&t.subs.length)||(t.people&&t.people.length);
html+=`<div class="card ${t.done?"done":""}"><div class="card-main" onclick="toggleExpand(${t.id})"><div class="chk ${t.done?"on":""}" onclick="event.stopPropagation();toggleDone(${t.id})"></div><div class="card-body"><div class="card-title">${escH(t.title)}</div><div class="card-meta"><span class="pill ${ownerPill[t.owner]}">${ownerLabel[t.owner]}</span><span class="pill ${energyPill[t.energy]}">${energyLabel[t.energy]}</span>${t.type!=="todo"?`<span class="pill pill-type">${typeLabel[t.type]}</span>`:""}${duePill(t.due)}${t.people&&t.people.length?t.people.slice(0,2).map(p=>`<span class="pill pill-person">${escH(p)}</span>`).join(""):""}</div></div>${hasD?`<button class="expand-btn" onclick="event.stopPropagation();toggleExpand(${t.id})">${exp?"&#9650;":"&#9660;"}</button>`:""}</div>`;
if(hasD){html+=`<div class="card-detail ${exp?"open":""}">`;if(t.notes)html+=`<div class="detail-section"><div class="detail-label">Notes &amp; context</div><div class="detail-content">${escH(t.notes)}</div></div>`;if(t.subs&&t.subs.length)html+=`<div class="detail-section"><div class="detail-label">Steps</div><div class="subtask-list">${t.subs.map((s,i)=>`<div class="subtask"><div class="sub-chk ${s.done?"on":""}" onclick="toggleSub(${t.id},${i})"></div><span class="${s.done?"sub-done":""}">${escH(s.text)}</span></div>`).join("")}</div></div>`;if(t.people&&t.people.length)html+=`<div class="detail-section"><div class="detail-label">People involved</div><div class="people-row">${t.people.map(p=>`<div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="${pColor(p)}">${initials(p)}</div><span class="person-name">${escH(p)}</span></div>`).join("")}</div></div>`;if(t.link)html+=`<div class="detail-section"><div class="detail-label">Reference / link</div><a class="link-item" href="${escH(t.link)}" target="_blank">${escH(t.link)}</a></div>`;html+=`<div class="detail-actions"><button class="det-btn danger" onclick="deleteTask(${t.id})">Remove task</button></div></div>`;}
html+=`</div>`;}html+=`</div>`;}
document.getElementById("board").innerHTML=html||`<div class="empty-state">${activeFilter==="done"?"No completed tasks yet — go get that first checkmark!":"Nothing here yet. Add a task to get started!"}</div>`;}
function escH(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
load();greeting();render();suggest();
</script>
</body>
</html>
